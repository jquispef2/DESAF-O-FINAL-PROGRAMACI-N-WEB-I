<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 240" fill="none">
  <rect width="460" height="240" rx="12" fill="#111520"/>
  <text x="230" y="26" font-family="sans-serif" font-size="12" fill="#8a9bb8" text-anchor="middle">Curva de demanda vs stock</text>
  <!-- Axes -->
  <line x1="50" y1="30" x2="50" y2="190" stroke="#2a3550" stroke-width="1.5"/>
  <line x1="50" y1="190" x2="420" y2="190" stroke="#2a3550" stroke-width="1.5"/>
  <!-- Stock line (decreasing) -->
  <polyline points="50,60 120,80 190,110 260,148 330,175 400,188" stroke="#3b82f6" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Demand line (spike then high) -->
  <polyline points="50,160 120,130 190,70 260,55 330,65 400,72" stroke="#ef4444" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Panic moment marker -->
  <line x1="170" y1="30" x2="170" y2="190" stroke="#f59e0b" stroke-width="1" stroke-dasharray="5,4" opacity="0.7"/>
  <text x="172" y="45" font-family="sans-serif" font-size="8" fill="#f59e0b">Rumor</text>
  <!-- Crossover -->
  <circle cx="220" cy="112" r="6" fill="none" stroke="#ef4444" stroke-width="2"/>
  <!-- Y labels -->
  <text x="12" y="64" font-family="sans-serif" font-size="8" fill="#4a5a78">Alto</text>
  <text x="12" y="130" font-family="sans-serif" font-size="8" fill="#4a5a78">Med</text>
  <text x="12" y="192" font-family="sans-serif" font-size="8" fill="#4a5a78">Bajo</text>
  <!-- X labels -->
  <text x="50" y="205" font-family="sans-serif" font-size="8" fill="#4a5a78" text-anchor="middle">D0</text>
  <text x="170" y="205" font-family="sans-serif" font-size="8" fill="#4a5a78" text-anchor="middle">D1</text>
  <text x="260" y="205" font-family="sans-serif" font-size="8" fill="#4a5a78" text-anchor="middle">D2</text>
  <text x="330" y="205" font-family="sans-serif" font-size="8" fill="#4a5a78" text-anchor="middle">D3</text>
  <text x="400" y="205" font-family="sans-serif" font-size="8" fill="#4a5a78" text-anchor="middle">D4</text>
  <!-- Legend -->
  <line x1="260" y1="218" x2="285" y2="218" stroke="#3b82f6" stroke-width="2"/>
  <text x="290" y="222" font-family="sans-serif" font-size="9" fill="#8a9bb8">Stock</text>
  <line x1="330" y1="218" x2="355" y2="218" stroke="#ef4444" stroke-width="2"/>
  <text x="360" y="222" font-family="sans-serif" font-size="9" fill="#8a9bb8">Demanda</text>
</svg>
