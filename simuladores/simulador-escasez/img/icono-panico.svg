<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" fill="none">
  <rect width="400" height="200" rx="12" fill="#111520"/>
  <!-- Three scenarios -->
  <rect x="15" y="30" width="110" height="145" rx="10" fill="#1a2130" stroke="#10b981" stroke-width="1.5"/>
  <text x="70" y="55" font-family="sans-serif" font-size="10" fill="#8a9bb8" text-anchor="middle">Sin rumor</text>
  <rect x="30" y="65" width="80" height="80" rx="6" fill="#111520"/>
  <rect x="30" y="105" width="80" height="40" rx="0 0 6 6" fill="#10b981" opacity="0.7"/>
  <text x="70" y="130" font-family="sans-serif" font-size="11" fill="white" text-anchor="middle">50%</text>
  <text x="70" y="160" font-family="sans-serif" font-size="9" fill="#10b981" text-anchor="middle">stock seguro</text>
  <text x="70" y="172" font-family="sans-serif" font-size="8" fill="#4a5a78" text-anchor="middle">demanda normal</text>

  <rect x="145" y="30" width="110" height="145" rx="10" fill="#1a2130" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="200" y="55" font-family="sans-serif" font-size="10" fill="#8a9bb8" text-anchor="middle">Día 1 rumor</text>
  <rect x="160" y="65" width="80" height="80" rx="6" fill="#111520"/>
  <rect x="160" y="125" width="80" height="20" rx="0 0 6 6" fill="#f59e0b" opacity="0.7"/>
  <text x="200" y="120" font-family="sans-serif" font-size="11" fill="white" text-anchor="middle">25%</text>
  <text x="200" y="160" font-family="sans-serif" font-size="9" fill="#f59e0b" text-anchor="middle">stock alerta</text>
  <text x="200" y="172" font-family="sans-serif" font-size="8" fill="#4a5a78" text-anchor="middle">demanda +200%</text>

  <rect x="275" y="30" width="110" height="145" rx="10" fill="#1a2130" stroke="#ef4444" stroke-width="1.5"/>
  <text x="330" y="55" font-family="sans-serif" font-size="10" fill="#8a9bb8" text-anchor="middle">Día 2-3 rumor</text>
  <rect x="290" y="65" width="80" height="80" rx="6" fill="#111520"/>
  <rect x="290" y="138" width="80" height="7" rx="0 0 6 6" fill="#ef4444" opacity="0.8"/>
  <text x="330" y="115" font-family="sans-serif" font-size="11" fill="#ef4444" text-anchor="middle">8%</text>
  <text x="330" y="160" font-family="sans-serif" font-size="9" fill="#ef4444" text-anchor="middle">stock crítico</text>
  <text x="330" y="172" font-family="sans-serif" font-size="8" fill="#4a5a78" text-anchor="middle">demanda +400%</text>
</svg>
