<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380" fill="none">
  <defs>
    <linearGradient id="tank-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#d97706" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0d12"/>
      <stop offset="100%" stop-color="#111520"/>
    </linearGradient>
  </defs>
  <rect width="600" height="380" fill="url(#bg-grad)"/>
  <!-- Background circles -->
  <circle cx="500" cy="80" r="120" fill="#f59e0b" opacity="0.04"/>
  <circle cx="100" cy="300" r="80" fill="#f59e0b" opacity="0.05"/>
  <!-- Fuel tank gauge -->
  <g transform="translate(60,60)">
    <rect x="0" y="0" width="200" height="280" rx="20" fill="#1a2130" stroke="#2a3550" stroke-width="2"/>
    <text x="100" y="30" font-family="sans-serif" font-size="13" fill="#8a9bb8" text-anchor="middle">Reserva</text>
    <!-- Tank area -->
    <rect x="20" y="40" width="160" height="200" rx="8" fill="#111520"/>
    <!-- Fuel level - 45% full -->
    <rect x="20" y="150" width="160" height="90" rx="0" fill="url(#tank-fill)" opacity="0.85"/>
    <rect x="20" y="225" width="160" height="15" rx="0 0 8 8" fill="#d97706" opacity="0.7"/>
    <!-- Level marks -->
    <line x1="175" y1="60" x2="185" y2="60" stroke="#2a3550" stroke-width="1.5"/>
    <line x1="175" y1="90" x2="185" y2="90" stroke="#2a3550" stroke-width="1.5"/>
    <line x1="175" y1="120" x2="185" y2="120" stroke="#2a3550" stroke-width="1.5"/>
    <line x1="175" y1="150" x2="185" y2="150" stroke="#f59e0b" stroke-width="2"/>
    <line x1="175" y1="180" x2="185" y2="180" stroke="#2a3550" stroke-width="1.5"/>
    <line x1="175" y1="210" x2="185" y2="210" stroke="#2a3550" stroke-width="1.5"/>
    <line x1="175" y1="240" x2="185" y2="240" stroke="#2a3550" stroke-width="1.5"/>
    <text x="192" y="154" font-family="sans-serif" font-size="9" fill="#f59e0b">45%</text>
    <!-- Level labels -->
    <text x="12" y="64" font-family="sans-serif" font-size="8" fill="#4a5a78">100%</text>
    <text x="12" y="244" font-family="sans-serif" font-size="8" fill="#4a5a78">0%</text>
    <!-- Pipe at bottom -->
    <rect x="85" y="240" width="30" height="25" rx="4" fill="#1f2940" stroke="#2a3550"/>
    <!-- Percentage -->
    <text x="100" y="275" font-family="sans-serif" font-size="16" font-weight="bold" fill="#f59e0b" text-anchor="middle">45%</text>
    <text x="100" y="290" font-family="sans-serif" font-size="9" fill="#4a5a78" text-anchor="middle">disponible</text>
  </g>
  <!-- Days projection -->
  <g transform="translate(320,60)">
    <rect x="0" y="0" width="240" height="280" rx="16" fill="#1a2130" stroke="#2a3550" stroke-width="1.5"/>
    <text x="120" y="30" font-family="sans-serif" font-size="13" fill="#8a9bb8" text-anchor="middle">Proyección de días</text>
    <!-- Day bars -->
    <g transform="translate(15,45)">
      <rect x="0" y="0" width="30" height="160" rx="4" fill="#10b981" opacity="0.8"/>
      <rect x="40" y="20" width="30" height="140" rx="4" fill="#10b981" opacity="0.7"/>
      <rect x="80" y="50" width="30" height="110" rx="4" fill="#f59e0b" opacity="0.8"/>
      <rect x="120" y="90" width="30" height="70" rx="4" fill="#f59e0b" opacity="0.7"/>
      <rect x="160" y="130" width="30" height="30" rx="4" fill="#ef4444" opacity="0.8"/>
      <rect x="200" y="155" width="30" height="5" rx="2" fill="#ef4444" opacity="0.5"/>
      <!-- Baseline -->
      <line x1="0" y1="162" x2="232" y2="162" stroke="#2a3550" stroke-width="1"/>
      <!-- Labels -->
      <text x="15" y="175" font-family="sans-serif" font-size="8" fill="#4a5a78" text-anchor="middle">D1</text>
      <text x="55" y="175" font-family="sans-serif" font-size="8" fill="#4a5a78" text-anchor="middle">D2</text>
      <text x="95" y="175" font-family="sans-serif" font-size="8" fill="#4a5a78" text-anchor="middle">D3</text>
      <text x="135" y="175" font-family="sans-serif" font-size="8" fill="#4a5a78" text-anchor="middle">D4</text>
      <text x="175" y="175" font-family="sans-serif" font-size="8" fill="#4a5a78" text-anchor="middle">D5</text>
      <text x="215" y="175" font-family="sans-serif" font-size="8" fill="#4a5a78" text-anchor="middle">D6</text>
    </g>
    <!-- Danger line -->
    <line x1="15" y1="182" x2="225" y2="182" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.7"/>
    <text x="230" y="186" font-family="sans-serif" font-size="8" fill="#ef4444">!</text>
    <!-- Stats -->
    <rect x="15" y="240" width="100" height="30" rx="6" fill="#111520"/>
    <text x="65" y="255" font-family="sans-serif" font-size="9" fill="#8a9bb8" text-anchor="middle">Días restantes</text>
    <text x="65" y="267" font-family="sans-serif" font-size="11" font-weight="bold" fill="#f59e0b" text-anchor="middle">4.5 días</text>
    <rect x="125" y="240" width="100" height="30" rx="6" fill="#111520"/>
    <text x="175" y="255" font-family="sans-serif" font-size="9" fill="#8a9bb8" text-anchor="middle">Consumo/día</text>
    <text x="175" y="267" font-family="sans-serif" font-size="11" font-weight="bold" fill="#10b981" text-anchor="middle">200 L</text>
  </g>
</svg>
