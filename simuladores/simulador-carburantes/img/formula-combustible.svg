<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 180" fill="none">
  <rect width="500" height="180" rx="12" fill="#111520"/>
  <text x="250" y="28" font-family="sans-serif" font-size="12" fill="#8a9bb8" text-anchor="middle">Modelo matemático de reservas</text>
  <!-- Formula boxes -->
  <rect x="20" y="50" width="110" height="60" rx="10" fill="#1a2130" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="75" y="75" font-family="sans-serif" font-size="10" fill="#4a5a78" text-anchor="middle">Reserva inicial</text>
  <text x="75" y="95" font-family="sans-serif" font-size="14" font-weight="bold" fill="#f59e0b" text-anchor="middle">R₀ (L)</text>
  <text x="135" y="83" font-family="sans-serif" font-size="20" fill="#2a3550" text-anchor="middle">−</text>
  <rect x="150" y="50" width="130" height="60" rx="10" fill="#1a2130" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="215" y="75" font-family="sans-serif" font-size="10" fill="#4a5a78" text-anchor="middle">Consumo × Días</text>
  <text x="215" y="95" font-family="sans-serif" font-size="13" font-weight="bold" fill="#3b82f6" text-anchor="middle">C × D (L)</text>
  <text x="285" y="83" font-family="sans-serif" font-size="20" fill="#2a3550" text-anchor="middle">=</text>
  <rect x="300" y="50" width="130" height="60" rx="10" fill="#1a2130" stroke="#10b981" stroke-width="1.5"/>
  <text x="365" y="75" font-family="sans-serif" font-size="10" fill="#4a5a78" text-anchor="middle">Reserva actual</text>
  <text x="365" y="95" font-family="sans-serif" font-size="14" font-weight="bold" fill="#10b981" text-anchor="middle">Rn (L)</text>
  <!-- Days formula -->
  <rect x="130" y="130" width="240" height="36" rx="8" fill="#1a2130" stroke="#2a3550"/>
  <text x="250" y="148" font-family="sans-serif" font-size="11" fill="#8a9bb8" text-anchor="middle">Días restantes = R₀ ÷ C</text>
  <text x="250" y="160" font-family="sans-serif" font-size="9" fill="#4a5a78" text-anchor="middle">Donde C = consumo diario en litros</text>
</svg>
