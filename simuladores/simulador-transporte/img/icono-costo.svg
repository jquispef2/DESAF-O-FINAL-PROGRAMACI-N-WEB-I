<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" fill="none">
  <rect width="300" height="200" rx="12" fill="#111520"/>
  <!-- Bar chart: weekly cost comparison -->
  <text x="150" y="25" font-family="sans-serif" font-size="11" fill="#8a9bb8" text-anchor="middle">Costo semanal comparado</text>
  <!-- Bars normal -->
  <rect x="30" y="120" width="30" height="60" rx="4" fill="#3b82f6" opacity="0.8"/>
  <rect x="90" y="100" width="30" height="80" rx="4" fill="#3b82f6" opacity="0.8"/>
  <rect x="150" y="90" width="30" height="90" rx="4" fill="#3b82f6" opacity="0.8"/>
  <rect x="210" y="80" width="30" height="100" rx="4" fill="#3b82f6" opacity="0.8"/>
  <!-- Bars desvio -->
  <rect x="60" y="80" width="30" height="100" rx="4" fill="#ef4444" opacity="0.7"/>
  <rect x="120" y="55" width="30" height="125" rx="4" fill="#ef4444" opacity="0.7"/>
  <rect x="180" y="40" width="30" height="140" rx="4" fill="#ef4444" opacity="0.7"/>
  <rect x="240" y="25" width="30" height="155" rx="4" fill="#ef4444" opacity="0.7"/>
  <!-- Baseline -->
  <line x1="20" y1="180" x2="280" y2="180" stroke="#2a3550" stroke-width="1.5"/>
  <!-- Week labels -->
  <text x="60" y="194" font-family="sans-serif" font-size="8" fill="#4a5a78" text-anchor="middle">S1</text>
  <text x="120" y="194" font-family="sans-serif" font-size="8" fill="#4a5a78" text-anchor="middle">S2</text>
  <text x="180" y="194" font-family="sans-serif" font-size="8" fill="#4a5a78" text-anchor="middle">S3</text>
  <text x="240" y="194" font-family="sans-serif" font-size="8" fill="#4a5a78" text-anchor="middle">S4</text>
  <!-- Legend -->
  <rect x="180" y="5" width="10" height="10" rx="2" fill="#3b82f6"/>
  <text x="194" y="14" font-family="sans-serif" font-size="8" fill="#8a9bb8">Normal</text>
  <rect x="225" y="5" width="10" height="10" rx="2" fill="#ef4444"/>
  <text x="239" y="14" font-family="sans-serif" font-size="8" fill="#8a9bb8">Desvío</text>
</svg>
